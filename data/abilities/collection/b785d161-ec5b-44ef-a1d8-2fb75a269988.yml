---

- id: b785d161-ec5b-44ef-a1d8-2fb75a269988
  name: M-Bus - Read Meter
  description: |
    Read an M-Bus meter's data (REQ_UD2 -> RSP_UD), disclosing its measured values
    (volume, flow, temperature, ...) and their units.
  tactic: collection
  technique_id: T0801
  technique_name: Monitor Process State
  executors:
  - platform: linux
    name: sh
    command: >
      ./mbus_cli #{mbus.server.ip} --port #{mbus.server.port} read #{mbus.address}
    payloads:
    - mbus_cli
    parsers:
    - module: plugins.mbus.app.parsers.record_set
      parserconfigs:
      - source: mbus.record.value
        edge: has_unit
        target: mbus.record.unit
  - platform: windows
    name: psh
    command: >
      .\mbus_cli.exe #{mbus.server.ip} --port #{mbus.server.port} read #{mbus.address}
    payloads:
    - mbus_cli.exe
    parsers:
    - module: plugins.mbus.app.parsers.record_set
      parserconfigs:
      - source: mbus.record.value
        edge: has_unit
        target: mbus.record.unit
  - platform: darwin
    name: sh
    command: >
      ./mbus_cli_darwin #{mbus.server.ip} --port #{mbus.server.port} read #{mbus.address}
    payloads:
    - mbus_cli_darwin
    parsers:
    - module: plugins.mbus.app.parsers.record_set
      parserconfigs:
      - source: mbus.record.value
        edge: has_unit
        target: mbus.record.unit
